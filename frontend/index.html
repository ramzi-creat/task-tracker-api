<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board</title>
    <style>
        :root{
            --bg: #0f1724;
            --page-bg: #f6f8fa;
            --surface: #ffffff;
            --muted: #6b7280;
            --primary: #2563eb;
            --accent: #06b6d4;
            --danger: #ef4444;
            --radius: 14px;
            --card-shadow: 0 6px 18px rgba(16,24,40,0.06);
        }
        * { box-sizing: border-box; }
        html,body{height:100%;}
        body { margin: 0; min-height: 100vh; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background: var(--page-bg); color: #0f1724; }

        .app-header{ background: linear-gradient(90deg, rgba(255,255,255,0.9), rgba(255,255,255,0.75)); backdrop-filter: blur(6px); padding: 1.125rem 1.25rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; max-width:1200px; margin:1.25rem auto 0; border-radius:12px; box-shadow: 0 4px 18px rgba(15,23,42,0.06); }
        .app-header h1{ margin:0; font-size:1.25rem; letter-spacing:-0.2px; }
        
        /* Subtitle style */
        .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin: 4px 0 0 0;
        }

        main{ max-width:1200px; margin:0.75rem auto 2rem; padding:0 1.25rem; }

        #error-message{ background: #fff1f2; border: 1px solid #fecaca; color: var(--danger); padding: 0.85rem 1rem; border-radius: 10px; margin-bottom: 1rem; display:none; }

        #board{ display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:1rem; }
        .column{ background: var(--surface); border-radius: var(--radius); padding:1rem; min-height:420px; display:flex; flex-direction:column; gap:0.75rem; box-shadow: var(--card-shadow); border: 1px solid rgba(15,23,42,0.04); }
        .column-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:0.25rem; }
        .column-title{ margin:0; font-size:1.05rem; font-weight:700; }
        .column-meta{ color:var(--muted); font-size:0.82rem; background:#f3f4f6; border-radius:999px; padding:0.25rem 0.6rem; }

        .task-list{ flex-grow:1; display:flex; flex-direction:column; gap:0.75rem; min-height:100px; }

        .task-card{ background:var(--surface); border-radius:12px; padding:0.9rem; cursor:grab; box-shadow: 0 3px 10px rgba(2,6,23,0.06); border:1px solid rgba(15,23,42,0.03); transition: transform 160ms ease, box-shadow 160ms ease; }
        .task-card:hover{ transform: translateY(-6px); box-shadow: 0 10px 30px rgba(2,6,23,0.08); }
        .task-card strong{ display:block; font-size:0.98rem; }
        .task-card p{ margin:0.4rem 0 0 0; color:var(--muted); font-size:0.9rem; }
        .task-card .actions{ display:flex; gap:0.5rem; align-items:center; }
        .task-card button{ background:transparent; border:0; color:var(--muted); padding:0.25rem 0.5rem; border-radius:8px; cursor:pointer; font-weight:600; transition: background 120ms, color 120ms; }
        .task-card button:hover{ background:#f3f4f6; color:#111827; }

        .priority-badge{ display:inline-flex; padding:0.18rem 0.5rem; border-radius:999px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; }
        .priority-badge.high{ background: linear-gradient(90deg,#fff1f0,#fee2e2); color:#991b1b; }
        .priority-badge.medium{ background: linear-gradient(90deg,#fffbea,#fef3c7); color:#92400e; }
        .priority-badge.low{ background: linear-gradient(90deg,#f0fdf4,#dcfce7); color:#166534; }

        .modal{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:1rem; z-index:1000; }
        .modal.hidden{ display:none; }
        .modal-backdrop{ position:absolute; inset:0; background: rgba(2,6,23,0.48); }
        .modal-dialog{ position:relative; z-index:1; width:min(96%,520px); background:var(--surface); border-radius:14px; padding:1.15rem; box-shadow: 0 18px 50px rgba(2,6,23,0.18); }

        .form-field{ display:flex; flex-direction:column; gap:0.15rem; margin-bottom:0.6rem; }
        .form-field label{ font-size:0.82rem; font-weight:700; color: #334155; }
        .form-field input, .form-field textarea, .form-field select{ border:1px solid #e6e9ee; border-radius:10px; padding:0.5rem 0.6rem; font-size:0.95rem; background: #fbfdff; }
        .form-field input:focus, .form-field textarea:focus, .form-field select:focus{ outline:2px solid rgba(37,99,235,0.12); border-color:var(--primary); }

        .modal-footer{ display:flex; justify-content:flex-end; gap:0.5rem; margin-top:0.5rem; }
        .secondary-btn, .primary-btn{ border:0; border-radius:999px; padding:0.45rem 0.9rem; cursor:pointer; font-size:0.95rem; }
        .secondary-btn{ background:#f3f4f6; color:#111827; }
        .primary-btn{ background:var(--primary); color:#fff; box-shadow: 0 6px 18px rgba(37,99,235,0.12); }
        .primary-btn:hover{ filter:brightness(1.03); }

        @media (max-width:640px){
            .app-header{ margin: 1rem; padding:0.9rem; }
            .column{ min-height: 320px; }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div>
            <h1>Task Board</h1>
            <p class="subtitle">Drag tasks between columns to update their status.</p>
        </div>
        <button onclick="openCreateModal()" class="primary-btn">Create Task</button>
    </header>
    <main>
        <div id="error-message"></div>
        <section id="board">
            <div class="column" id="col-todo">
                <div class="column-header">
                    <h3 class="column-title">To Do</h3>
                    <span class="column-meta item-count">0 items</span>
                </div>
                <div id="todo" class="task-list" ondragover="event.preventDefault()" ondrop="drop(event)"></div>
            </div>
            <div class="column" id="col-inprogress">
                <div class="column-header">
                    <h3 class="column-title">In Progress</h3>
                    <span class="column-meta item-count">0 items</span>
                </div>
                <div id="inprogress" class="task-list" ondragover="event.preventDefault()" ondrop="drop(event)"></div>
            </div>
            <div class="column" id="col-done">
                <div class="column-header">
                    <h3 class="column-title">Done</h3>
                    <span class="column-meta item-count">0 items</span>
                </div>
                <div id="done" class="task-list" ondragover="event.preventDefault()" ondrop="drop(event)"></div>
            </div>
        </section>
    </main>

    <div id="modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-dialog">
            <h2 id="modal-title" style="font-size: 1.1rem; margin: 0 0 0.8rem 0;">Task</h2>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-field"><label>Title</label><input id="title" required></div>
                <div class="form-field"><label>Description</label><textarea id="description" style="height: 60px;"></textarea></div>
                <div class="form-field"><label>Status</label><select id="status"><option>To Do</option><option>In Progress</option><option>Done</option></select></div>
                <div class="form-field"><label>Priority</label><select id="priority"><option>Low</option><option>Medium</option><option>High</option></select></div>
                <div class="form-field"><label>Assignee</label><input id="assignee"></div>
                <div class="modal-footer">
                    <button type="button" class="secondary-btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="primary-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/tasks";
        let tasks = [];

        function normalizeStatus(value) {
            const map = {
                "To Do": "ToDo",
                "In Progress": "In Progress",
                "Done": "Done"
            };
            return map[value] || value;
        }

        function formatStatusForForm(value) {
            if (value === "ToDo") return "To Do";
            return value;
        }

        function getColumnIdForStatus(status) {
            const value = String(status || '').trim();
            if (value === 'ToDo' || value === 'To Do' || value === 'todo') return 'todo';
            if (value === 'In Progress' || value === 'InProgress' || value === 'inprogress' || value === 'in progress') return 'inprogress';
            if (value === 'Done' || value === 'done') return 'done';
            return 'todo';
        }

        async function fetchTasks() {
            try {
                const res = await fetch(API_URL);
                tasks = await res.json();
                render();
            } catch (e) { 
                console.error("Could not fetch tasks", e); 
            }
        }

        function render() {
            document.querySelectorAll('.task-list').forEach(list => list.innerHTML = '');

            // Priority mapping values to determine order
            const priorityOrder = { "High": 3, "Medium": 2, "Low": 1 };

            // Sort tasks from highest priority value to lowest
            const sortedTasks = [...tasks].sort((a, b) => {
                const valA = priorityOrder[a.priority] || 0;
                const valB = priorityOrder[b.priority] || 0;
                return valB - valA;
            });

            sortedTasks.forEach(task => {
                const colId = getColumnIdForStatus(task.status);
                const col = document.getElementById(colId);
                if (col) {
                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.draggable = true;
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <strong>${task.title}</strong>
                            <button onclick="openEditModal('${task.id}')">Edit</button>
                        </div>
                        <p style="font-size:0.85rem">${task.description || ''}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:0.5rem; margin-top:0.4rem;">
                            <span class="priority-badge ${task.priority.toLowerCase()}">${task.priority}</span>
                            <span style="font-size:0.75rem; color:#6b7280;">${task.status}</span>
                        </div>
                    `;
                    card.ondragstart = (e) => e.dataTransfer.setData('text/plain', task.id);
                    col.appendChild(card);
                }
            });
            document.querySelectorAll('.column').forEach(c => {
                c.querySelector('.item-count').textContent = c.querySelectorAll('.task-card').length + ' items';
            });
        }

        async function drop(e) {
            e.preventDefault();
            const column = e.target.closest('.column');
            if (!column) return;

            const id = e.dataTransfer.getData('text/plain');
            const task = tasks.find(t => t.id == id);
            if (!task) return;

            const newStatus = normalizeStatus(column.querySelector('.column-title').textContent);
            const errorDiv = document.getElementById('error-message');

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status: newStatus })
                });

                if (!response.ok) {
                    const err = await response.text();
                    errorDiv.textContent = err || 'Could not update task status.';
                    errorDiv.style.display = 'block';
                    return;
                }

                errorDiv.style.display = 'none';
                fetchTasks();
            } catch (err) {
                errorDiv.textContent = 'Network error while updating task status.';
                errorDiv.style.display = 'block';
            }
        }

        function openCreateModal() { 
            document.getElementById('task-form').reset(); 
            document.getElementById('task-id').value = ''; 
            document.getElementById('modal').classList.remove('hidden'); 
        }

        function openEditModal(id) {
            const t = tasks.find(x => x.id == id);
            document.getElementById('task-id').value = t.id;
            document.getElementById('title').value = t.title;
            document.getElementById('description').value = t.description;
            document.getElementById('status').value = formatStatusForForm(t.status);
            document.getElementById('priority').value = t.priority;
            document.getElementById('assignee').value = t.assignee || '';
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
        }

        document.getElementById('task-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('task-id').value;
            
            const data = { 
                title: document.getElementById('title').value, 
                description: document.getElementById('description').value, 
                status: normalizeStatus(document.getElementById('status').value),
                priority: document.getElementById('priority').value, 
                assignee: document.getElementById('assignee').value || null
            };
            
            try {
                const response = await fetch(id ? `${API_URL}/${id}` : API_URL, { 
                    method: id ? 'PATCH' : 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(data) 
                });
                if (response.ok) { 
                    closeModal(); 
                    fetchTasks(); 
                } else {
                    const err = await response.text();
                    console.error("Server rejected save:", err);
                    alert("Error saving: " + err);
                }
            } catch (err) { 
                console.error(err); 
                alert("Network error."); 
            }
        };

        fetchTasks();
    </script>
</body>
</html>
